<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photobooth Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { 
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom Scrollbar for Desktop & Hidden for Mobile */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        @media (max-width: 1024px) {
            .custom-scrollbar::-webkit-scrollbar { display: none; }
        }
        
        #canvasWrapper { transition: aspect-ratio 0.4s ease-in-out; }
        .modal-backdrop { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 antialiased h-screen flex flex-col overflow-hidden selection:bg-indigo-200 transition-colors duration-300">

    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 md:px-6 py-3 md:py-4 flex justify-between items-center z-20 shrink-0 transition-colors duration-300">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white rounded-xl shadow-lg shadow-indigo-500/30 overflow-hidden w-10 h-10 md:w-12 md:h-12 flex items-center justify-center shrink-0">
                <i data-lucide="camera" class="w-5 h-5 md:w-6 md:h-6" id="defaultLogoIcon"></i>
                <img id="appHeaderLogo" class="w-full h-full object-cover hidden" src="">
            </div>
            <div>
                <h1 id="appHeaderTitle" class="text-base md:text-xl font-extrabold tracking-tight text-slate-900 dark:text-white uppercase line-clamp-1">MARTIVE.ID PHOTO BOOTH</h1>
            </div>
        </div>
        <div class="flex items-center gap-2 md:gap-3">
            <button id="fullscreenBtn" class="p-2.5 md:p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-indigo-600 dark:hover:text-indigo-400 rounded-xl transition-all">
                <i data-lucide="maximize" class="w-5 h-5"></i>
            </button>
            <button onclick="openModal('settingsModal')" class="p-2.5 md:p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-indigo-600 dark:hover:text-indigo-400 rounded-xl transition-all">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
        
        <section class="flex-1 p-3 md:p-6 lg:p-8 flex flex-col items-center justify-center overflow-y-auto relative z-10 w-full custom-scrollbar">
            
            <div class="w-full max-w-4xl flex flex-col items-center gap-4 md:gap-6 h-full justify-center">
                
                <div class="relative w-full flex justify-center w-full max-h-[55vh] md:max-h-[65vh] lg:max-h-[70vh]">
                    <div id="canvasWrapper" class="relative bg-black shadow-2xl rounded-2xl md:rounded-3xl border border-slate-200 dark:border-slate-800 overflow-hidden aspect-[3/4] h-full flex justify-center items-center transition-all duration-300">
                        
                        <video id="videoElement" class="hidden" autoplay playsinline></video>
                        <canvas id="displayCanvas" class="h-full object-contain pointer-events-none"></canvas>
                        
                        <div id="flashEffect" class="absolute inset-0 bg-white opacity-0 transition-opacity duration-150 z-20 pointer-events-none"></div>
                        <div id="countdownOverlay" class="absolute inset-0 bg-black/70 hidden flex-col items-center justify-center z-30 pointer-events-none backdrop-blur-sm">
                            <span id="countdownNumber" class="text-white text-[120px] md:text-[150px] font-black drop-shadow-2xl tabular-nums">3</span>
                        </div>
                    </div>
                </div>

                <div class="w-full max-w-3xl grid grid-cols-4 md:grid-cols-5 gap-2 md:gap-3 bg-white/60 dark:bg-slate-900/60 backdrop-blur-md p-2 md:p-3 rounded-2xl md:rounded-3xl shadow-lg border border-slate-200 dark:border-slate-800 transition-colors duration-300 shrink-0">
                    
                    <div class="col-span-2 md:col-span-1">
                        <select id="timerSelect" class="w-full h-full min-h-[48px] md:min-h-[56px] bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl md:rounded-2xl px-3 md:px-4 text-xs md:text-sm font-bold text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer transition-all">
                            <option value="0">⚡ Instan</option>
                            <option value="3" selected>⏱️ 3 Detik</option>
                            <option value="5">⏱️ 5 Detik</option>
                        </select>
                    </div>

                    <div class="col-span-4 md:col-span-3 order-first md:order-none">
                        <button id="captureBtn" class="w-full h-full min-h-[56px] md:min-h-[64px] bg-slate-900 dark:bg-indigo-600 hover:bg-indigo-600 dark:hover:bg-indigo-500 text-white font-black text-base md:text-lg rounded-xl md:rounded-2xl transition-all flex items-center justify-center gap-2 transform active:scale-[0.98] shadow-xl">
                            <i data-lucide="aperture" class="w-5 h-5 md:w-6 md:h-6"></i> AMBIL FOTO
                        </button>
                    </div>

                    <div class="col-span-2 md:col-span-1 flex gap-2">
                        <button id="switchCameraBtn" class="flex-1 h-full min-h-[48px] md:min-h-[56px] bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl md:rounded-2xl flex items-center justify-center transition-all shadow-sm" title="Putar Kamera">
                            <i data-lucide="switch-camera" class="w-4 h-4 md:w-5 md:h-5"></i>
                        </button>
                        <button id="cycleFrameBtn" class="flex-1 h-full min-h-[48px] md:min-h-[56px] bg-indigo-50 dark:bg-indigo-500/20 hover:bg-indigo-100 dark:hover:bg-indigo-500/40 border border-indigo-200 dark:border-indigo-500/30 text-indigo-700 dark:text-indigo-400 rounded-xl md:rounded-2xl flex items-center justify-center transition-all shadow-sm" title="Ganti Bingkai (Pilih)">
                            <i data-lucide="layout-template" class="w-4 h-4 md:w-5 md:h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="w-full lg:w-[380px] xl:w-[420px] h-[160px] md:h-[220px] lg:h-full bg-white dark:bg-slate-900 lg:border-l border-t lg:border-t-0 border-slate-200 dark:border-slate-800 flex flex-col z-20 shrink-0 transition-colors duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] lg:shadow-2xl">
            <div class="px-4 md:px-6 py-3 md:py-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <i data-lucide="images" class="w-4 h-4 md:w-5 md:h-5 text-indigo-500"></i>
                    <h3 class="font-bold text-slate-800 dark:text-white text-sm md:text-base tracking-wide">GALERI</h3>
                </div>
                <span id="photoCount" class="text-[10px] md:text-xs font-bold bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 px-2.5 py-1 rounded-full">0 Foto</span>
            </div>
            
            <div id="galleryContainer" class="flex-1 p-3 md:p-6 flex flex-row lg:flex-col lg:grid lg:grid-cols-2 gap-3 overflow-x-auto lg:overflow-y-auto lg:overflow-x-hidden custom-scrollbar items-center lg:items-start lg:content-start bg-slate-50/50 dark:bg-slate-950/50">
                <div id="emptyState" class="w-full col-span-2 h-full min-h-[100px] flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 opacity-70 shrink-0">
                    <i data-lucide="camera-off" class="w-8 h-8 md:w-12 md:h-12 mb-2"></i>
                    <p class="font-medium text-xs md:text-sm">Belum ada foto.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-slate-900/60 dark:bg-black/80 modal-backdrop hidden items-center justify-center z-50 p-4 transition-opacity">
        <div class="bg-white dark:bg-slate-900 rounded-[2rem] w-full max-w-md p-6 md:p-8 shadow-2xl transform transition-transform scale-95 border border-slate-100 dark:border-slate-800 max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="bg-slate-100 dark:bg-slate-800 p-2 rounded-full text-slate-600 dark:text-slate-300"><i data-lucide="sliders-horizontal" class="w-5 h-5"></i></div>
                    <h2 class="text-lg md:text-xl font-bold text-slate-800 dark:text-white">Pengaturan Sistem</h2>
                </div>
                <button onclick="closeModal('settingsModal')" class="text-slate-400 hover:text-red-500 bg-slate-50 dark:bg-slate-800 p-2 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div class="space-y-5">
                <!-- Ubah Logo -->
                <div>
                    <label class="block text-[10px] md:text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Logo Header (Rasio 1:1)</label>
                    <input type="file" id="settingLogoUpload" accept="image/png, image/jpeg, image/svg+xml" class="w-full text-xs text-slate-500 dark:text-slate-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 dark:file:bg-indigo-500/20 dark:file:text-indigo-400 hover:file:bg-indigo-100 dark:hover:file:bg-indigo-500/30 cursor-pointer border border-slate-200 dark:border-slate-700 rounded-xl p-1 bg-slate-50 dark:bg-slate-800">
                </div>
                
                <div>
                    <label class="block text-[10px] md:text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Judul Acara / Frame</label>
                    <input type="text" id="settingTitle" class="w-full p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all font-medium text-slate-700 dark:text-slate-200">
                </div>

                <!-- Slot Frame 1-3 -->
                <div class="pt-2">
                    <label class="block text-[10px] md:text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Unggah Bingkai Kustom (PNG)</label>
                    <div class="space-y-2">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold w-16 text-slate-400">Frame 1</span>
                            <input type="file" id="settingFrame1" accept="image/png" class="flex-1 text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-slate-200 file:text-slate-700 dark:file:bg-slate-700 dark:file:text-slate-300 border border-slate-200 dark:border-slate-700 rounded-lg p-1 bg-white dark:bg-slate-800">
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold w-16 text-slate-400">Frame 2</span>
                            <input type="file" id="settingFrame2" accept="image/png" class="flex-1 text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-slate-200 file:text-slate-700 dark:file:bg-slate-700 dark:file:text-slate-300 border border-slate-200 dark:border-slate-700 rounded-lg p-1 bg-white dark:bg-slate-800">
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold w-16 text-slate-400">Frame 3</span>
                            <input type="file" id="settingFrame3" accept="image/png" class="flex-1 text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-slate-200 file:text-slate-700 dark:file:bg-slate-700 dark:file:text-slate-300 border border-slate-200 dark:border-slate-700 rounded-lg p-1 bg-white dark:bg-slate-800">
                        </div>
                    </div>
                </div>
                
                <div>
                    <label class="block text-[10px] md:text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Orientasi Photobooth</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="cursor-pointer group">
                            <input type="radio" name="orient" value="portrait" checked class="hidden peer">
                            <div class="text-center py-2.5 rounded-xl border-2 border-slate-200 dark:border-slate-700 peer-checked:border-indigo-600 dark:peer-checked:border-indigo-500 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-500/10 peer-checked:text-indigo-700 dark:peer-checked:text-indigo-400 text-slate-500 dark:text-slate-400 font-bold text-xs md:text-sm transition-all">
                                Portrait
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" name="orient" value="landscape" class="hidden peer">
                            <div class="text-center py-2.5 rounded-xl border-2 border-slate-200 dark:border-slate-700 peer-checked:border-indigo-600 dark:peer-checked:border-indigo-500 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-500/10 peer-checked:text-indigo-700 dark:peer-checked:text-indigo-400 text-slate-500 dark:text-slate-400 font-bold text-xs md:text-sm transition-all">
                                Landscape
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" name="orient" value="square" class="hidden peer">
                            <div class="text-center py-2.5 rounded-xl border-2 border-slate-200 dark:border-slate-700 peer-checked:border-indigo-600 dark:peer-checked:border-indigo-500 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-500/10 peer-checked:text-indigo-700 dark:peer-checked:text-indigo-400 text-slate-500 dark:text-slate-400 font-bold text-xs md:text-sm transition-all">
                                Square
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] md:text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Format Ekspor Foto</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="cursor-pointer group">
                            <input type="radio" name="format" value="png" checked class="hidden peer">
                            <div class="text-center py-2.5 rounded-xl border-2 border-slate-200 dark:border-slate-700 peer-checked:border-indigo-600 dark:peer-checked:border-indigo-500 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-500/10 peer-checked:text-indigo-700 dark:peer-checked:text-indigo-400 text-slate-500 dark:text-slate-400 font-bold text-xs md:text-sm transition-all">
                                PNG (HD)
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" name="format" value="jpeg" class="hidden peer">
                            <div class="text-center py-2.5 rounded-xl border-2 border-slate-200 dark:border-slate-700 peer-checked:border-indigo-600 dark:peer-checked:border-indigo-500 peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-500/10 peer-checked:text-indigo-700 dark:peer-checked:text-indigo-400 text-slate-500 dark:text-slate-400 font-bold text-xs md:text-sm transition-all">
                                JPEG (Ringan)
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-2 pt-2">
                    <div class="flex items-center justify-between p-3.5 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700">
                        <div>
                            <p class="font-bold text-sm text-slate-700 dark:text-slate-200">Mode Gelap (Night Mode)</p>
                            <p class="text-[10px] text-slate-500 dark:text-slate-400">Ubah tampilan menjadi gelap</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="settingNightMode" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-300 dark:bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>

                    <div class="flex items-center justify-between p-3.5 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700">
                        <div>
                            <p class="font-bold text-sm text-slate-700 dark:text-slate-200">Cermin Kamera Depan</p>
                            <p class="text-[10px] text-slate-500 dark:text-slate-400">Matikan jika frame ada teks</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="settingMirror" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-slate-300 dark:bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>

                    <div class="flex items-center justify-between p-3.5 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700">
                        <div>
                            <p class="font-bold text-sm text-slate-700 dark:text-slate-200">Suara Sistem</p>
                            <p class="text-[10px] text-slate-500 dark:text-slate-400">Bunyi hitung mundur</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="settingSound" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-slate-300 dark:bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>

                    <div class="flex items-center justify-between p-3.5 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700">
                        <div>
                            <p class="font-bold text-sm text-slate-700 dark:text-slate-200">Unduh Otomatis</p>
                            <p class="text-[10px] text-slate-500 dark:text-slate-400">Simpan langsung ke HP/PC</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="settingAutoDownload" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-300 dark:bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>
                </div>
            </div>
            
            <button onclick="saveSettings()" class="mt-6 w-full bg-slate-900 dark:bg-indigo-600 hover:bg-slate-800 dark:hover:bg-indigo-500 text-white font-bold py-3.5 md:py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <i data-lucide="check-circle" class="w-5 h-5"></i> Simpan Pengaturan
            </button>
        </div>
    </div>

    <div id="previewModal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden items-center justify-center z-[60] p-4 md:p-8">
        <button onclick="closeModal('previewModal')" class="absolute top-4 right-4 md:top-6 md:right-6 text-white/70 hover:text-white bg-white/10 hover:bg-white/20 p-2 md:p-3 rounded-full transition-all backdrop-blur-sm z-10">
            <i data-lucide="x" class="w-5 h-5 md:w-6 md:h-6"></i>
        </button>
        
        <div class="max-w-5xl w-full h-full flex flex-col md:flex-row items-center justify-center gap-6 md:gap-8">
            <div class="relative w-full max-w-[320px] md:max-w-full md:flex-1 h-[55vh] md:h-[80vh] flex justify-center items-center">
                <img id="previewImage" src="" class="max-w-full max-h-full object-contain rounded-xl shadow-2xl ring-1 ring-white/20">
            </div>
            
            <div class="flex flex-row md:flex-col gap-3 w-full md:w-64 shrink-0 justify-center">
                <button onclick="actionDownload()" class="flex-1 md:flex-none flex items-center justify-center gap-2 md:gap-3 bg-white hover:bg-slate-200 text-slate-900 font-bold py-3 md:py-4 px-4 md:px-6 rounded-xl md:rounded-2xl transition-all shadow-xl text-sm md:text-base">
                    <i data-lucide="download" class="w-4 h-4 md:w-5 md:h-5"></i> Unduh
                </button>
                <button onclick="actionPrint()" class="flex-1 md:flex-none flex items-center justify-center gap-2 md:gap-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 md:py-4 px-4 md:px-6 rounded-xl md:rounded-2xl transition-all shadow-xl text-sm md:text-base">
                    <i data-lucide="printer" class="w-4 h-4 md:w-5 md:h-5"></i> Cetak
                </button>
                <button onclick="actionDelete()" class="md:w-full flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white font-bold py-3 md:py-4 px-4 md:px-6 rounded-xl md:rounded-2xl transition-all border border-red-500/30 hover:border-red-500 text-sm md:text-base shrink-0">
                    <i data-lucide="trash-2" class="w-4 h-4 md:w-5 md:h-5"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        let settings = { 
            title: 'MARTIVE.ID PHOTO BOOTH', 
            orientation: 'portrait',
            format: 'png',
            sound: true,
            autoDownload: false,
            mirror: true,
            nightMode: false
        };
        let photos = [];
        let stream = null;
        let currentFacingMode = 'user';
        
        // Multi-frame system
        let customFrames = [null, null, null];
        let activeFrameIndex = -1; // -1 = default, 0,1,2 = custom frames

        let activePhotoId = null;
        let isCapturing = false;

        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('displayCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvasWrapper');

        const RESOLUTIONS = {
            portrait: { w: 1200, h: 1600, aspect: '3/4' },
            landscape: { w: 1600, h: 1200, aspect: '4/3' },
            square: { w: 1200, h: 1200, aspect: '1/1' }
        };

        function applyNightMode(isNight) {
            if (isNight) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function playSound(type) {
            if (!settings.sound) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'beep') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'shutter') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                }
            } catch(e) {}
        }

        async function initCamera(facingMode = 'user') {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    updateCanvasResolution();
                    if (!window.renderLoopStarted) { render(); window.renderLoopStarted = true; }
                };
            } catch(e) { 
                alert("Gagal mengakses kamera. Pastikan izin diberikan.");
            }
        }

        function updateCanvasResolution() {
            const res = RESOLUTIONS[settings.orientation];
            canvas.width = res.w;
            canvas.height = res.h;
            wrapper.style.aspectRatio = res.aspect;
            
            document.getElementById('settingTitle').value = settings.title;
            document.querySelector(`input[name="orient"][value="${settings.orientation}"]`).checked = true;
            document.querySelector(`input[name="format"][value="${settings.format}"]`).checked = true;
            document.getElementById('settingMirror').checked = settings.mirror;
            document.getElementById('settingSound').checked = settings.sound;
            document.getElementById('settingAutoDownload').checked = settings.autoDownload;
            document.getElementById('settingNightMode').checked = settings.nightMode;
            applyNightMode(settings.nightMode);
        }

        function render() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const vRatio = video.videoWidth / video.videoHeight;
                const cRatio = canvas.width / canvas.height;
                let sx, sy, sWidth, sHeight;

                if (vRatio > cRatio) {
                    sHeight = video.videoHeight; sWidth = sHeight * cRatio;
                    sx = (video.videoWidth - sWidth) / 2; sy = 0;
                } else {
                    sWidth = video.videoWidth; sHeight = sWidth / cRatio;
                    sx = 0; sy = (video.videoHeight - sHeight) / 2;
                }

                ctx.save();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (currentFacingMode === 'user' && settings.mirror) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
                ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
                ctx.restore();
                drawOverlayFrame();
            }
            requestAnimationFrame(render);
        }

        function drawOverlayFrame() {
            if (activeFrameIndex !== -1 && customFrames[activeFrameIndex] && customFrames[activeFrameIndex].complete) {
                ctx.drawImage(customFrames[activeFrameIndex], 0, 0, canvas.width, canvas.height);
            } else {
                const isLandscape = settings.orientation === 'landscape';
                const padding = 50; const bottomPadding = isLandscape ? 120 : 200;
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, padding); 
                ctx.fillRect(0, 0, padding, canvas.height); 
                ctx.fillRect(canvas.width - padding, 0, padding, canvas.height); 
                ctx.fillRect(0, canvas.height - bottomPadding, canvas.width, bottomPadding);

                ctx.fillStyle = '#0f172a';
                ctx.font = `800 ${isLandscape ? '40px' : '50px'} Inter, sans-serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(settings.title, canvas.width / 2, canvas.height - (bottomPadding / 2));
            }
        }

        function saveSettings() {
            settings.title = document.getElementById('settingTitle').value.toUpperCase();
            settings.orientation = document.querySelector('input[name="orient"]:checked').value;
            settings.format = document.querySelector('input[name="format"]:checked').value;
            settings.mirror = document.getElementById('settingMirror').checked;
            settings.sound = document.getElementById('settingSound').checked;
            settings.autoDownload = document.getElementById('settingAutoDownload').checked;
            settings.nightMode = document.getElementById('settingNightMode').checked;
            
            document.getElementById('appHeaderTitle').textContent = settings.title;
            updateCanvasResolution();
            closeModal('settingsModal');
        }

        // Logo Upload Handler
        document.getElementById('settingLogoUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('appHeaderLogo').src = ev.target.result;
                    document.getElementById('appHeaderLogo').classList.remove('hidden');
                    document.getElementById('defaultLogoIcon').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // Frame Upload Handlers
        function handleFrameUpload(event, index) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image(); 
                    img.onload = () => { 
                        customFrames[index] = img; 
                        activeFrameIndex = index; // Otomatis pilih frame yang baru diunggah
                    }; 
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
        
        document.getElementById('settingFrame1').addEventListener('change', (e) => handleFrameUpload(e, 0));
        document.getElementById('settingFrame2').addEventListener('change', (e) => handleFrameUpload(e, 1));
        document.getElementById('settingFrame3').addEventListener('change', (e) => handleFrameUpload(e, 2));

        // Tombol Pilih/Ganti Bingkai di Layar Utama
        document.getElementById('cycleFrameBtn').onclick = () => {
            let nextIndex = activeFrameIndex;
            for (let i = 0; i < 4; i++) {
                nextIndex++;
                if (nextIndex > 2) nextIndex = -1; // Kembali ke default

                if (nextIndex === -1) {
                    activeFrameIndex = -1;
                    break;
                } else if (customFrames[nextIndex] !== null && customFrames[nextIndex].complete) {
                    activeFrameIndex = nextIndex;
                    break;
                }
            }
        };

        document.getElementById('switchCameraBtn').onclick = () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user'; initCamera(currentFacingMode);
        };

        document.getElementById('captureBtn').onclick = () => {
            if (isCapturing) return;
            const timer = parseInt(document.getElementById('timerSelect').value);
            if (timer > 0) startCountdown(timer); else executeCapture();
        };

        function startCountdown(seconds) {
            isCapturing = true;
            const overlay = document.getElementById('countdownOverlay');
            const numEl = document.getElementById('countdownNumber');
            overlay.classList.remove('hidden'); overlay.classList.add('flex');
            
            let counter = seconds; numEl.textContent = counter; playSound('beep');
            const interval = setInterval(() => {
                counter--;
                if (counter > 0) { numEl.textContent = counter; playSound('beep'); } 
                else { clearInterval(interval); overlay.classList.add('hidden'); overlay.classList.remove('flex'); executeCapture(); }
            }, 1000);
        }

        function executeCapture() {
            playSound('shutter');
            const flash = document.getElementById('flashEffect');
            flash.classList.remove('opacity-0'); flash.classList.add('opacity-100');
            setTimeout(() => {
                flash.classList.remove('opacity-100'); flash.classList.add('opacity-0');
                const mimeType = settings.format === 'jpeg' ? 'image/jpeg' : 'image/png';
                const fileExt = settings.format === 'jpeg' ? 'jpg' : 'png';
                photos.unshift({ id: Date.now(), data: canvas.toDataURL(mimeType, 1.0), ext: fileExt });
                updateGallery();
                isCapturing = false;
                if (settings.autoDownload) actionDownload(photos[0].id);
            }, 100);
        }

        function updateGallery() {
            const container = document.getElementById('galleryContainer');
            const emptyState = document.getElementById('emptyState');
            document.getElementById('photoCount').textContent = `${photos.length} Foto`;
            
            emptyState.style.display = photos.length > 0 ? 'none' : 'flex';
            container.querySelectorAll('.photo-card').forEach(e => e.remove());

            photos.forEach(p => {
                const div = document.createElement('div');
                // Styling responsive: kotak ukuran fix di mobile (horizontal scroll), responsif grid di desktop
                div.className = 'photo-card relative group rounded-xl md:rounded-2xl overflow-hidden bg-slate-200 dark:bg-slate-800 cursor-pointer shadow-sm hover:shadow-md transition-all border border-slate-200 dark:border-slate-700 aspect-[3/4] flex items-center justify-center shrink-0 w-[100px] md:w-full h-[133px] md:h-auto';
                div.innerHTML = `
                    <img src="${p.data}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-indigo-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-[2px]">
                        <span class="bg-white text-indigo-900 text-[10px] font-bold px-2 py-1 rounded-full shadow-lg flex items-center gap-1"><i data-lucide="zoom-in" class="w-3 h-3"></i></span>
                    </div>
                `;
                div.onclick = () => openPreview(p.id);
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function openPreview(id) {
            const photo = photos.find(p => p.id === id);
            if (!photo) return;
            activePhotoId = id;
            document.getElementById('previewImage').src = photo.data;
            openModal('previewModal');
        }

        function actionDownload(targetId = null) {
            const idToDownload = typeof targetId === 'number' ? targetId : activePhotoId;
            const photo = photos.find(p => p.id === idToDownload);
            if (photo) {
                const a = document.createElement('a'); a.href = photo.data; a.download = `Photo-${photo.id}.${photo.ext || 'png'}`; a.click();
            }
        }

        function actionPrint() {
            const photo = photos.find(p => p.id === activePhotoId);
            if (photo) {
                const win = window.open('', '_blank');
                win.document.write(`<html><body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#000;"><img src="${photo.data}" style="max-width:100%;max-height:100vh;object-fit:contain;" onload="window.print();window.close();"></body></html>`);
                win.document.close();
            }
        }

        function actionDelete() {
            if (confirm('Yakin hapus foto ini?')) {
                photos = photos.filter(p => p.id !== activePhotoId); updateGallery(); closeModal('previewModal');
            }
        }

        function openModal(id) {
            const el = document.getElementById(id); el.classList.remove('hidden'); el.classList.add('flex');
            setTimeout(() => el.firstElementChild.classList.remove('scale-95'), 10);
        }
        
        function closeModal(id) {
            const el = document.getElementById(id); el.firstElementChild.classList.add('scale-95');
            setTimeout(() => { el.classList.add('hidden'); el.classList.remove('flex'); }, 150);
        }

        document.getElementById('fullscreenBtn').onclick = () => {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e => {}); } 
            else { document.exitFullscreen(); }
        };

        window.onload = () => { updateCanvasResolution(); initCamera(); };
    </script>
</body>
</html>
