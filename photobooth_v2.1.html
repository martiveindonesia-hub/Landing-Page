<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Martive.ID Photobooth V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; background-color: #0f172a; color: #ffffff; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-button { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.15); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-button:hover { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3); transform: translateY(-2px); }
        .glass-button:active { transform: scale(0.96); }
        .glass-input { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .h-dvh { height: 100dvh; }
    </style>
</head>
<body class="h-dvh w-full overflow-hidden flex flex-col relative selection:bg-indigo-500/30">

    <div class="absolute inset-0 z-0 flex items-center justify-center bg-[#050505] p-4 md:p-10 pb-[140px] pt-[80px]">
        <div id="canvasWrapper" class="relative w-full h-full flex justify-center items-center transition-all duration-500">
            <video id="videoElement" class="hidden" autoplay playsinline muted></video>
            <canvas id="displayCanvas" class="max-w-full max-h-full object-contain rounded-2xl shadow-[0_0_50px_rgba(0,0,0,0.5)]"></canvas>
            <div id="flashEffect" class="absolute inset-0 bg-white opacity-0 transition-opacity duration-[100ms] pointer-events-none rounded-2xl z-20"></div>
            <div id="countdownOverlay" class="absolute inset-0 flex items-center justify-center pointer-events-none z-30 hidden backdrop-blur-sm rounded-2xl bg-black/20">
                <span id="countdownNumber" class="text-white text-[150px] font-black tabular-nums animate-pulse">3</span>
            </div>
        </div>
    </div>

    <header class="absolute top-0 w-full z-20 glass-panel border-t-0 border-x-0 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                <i data-lucide="aperture" class="w-5 h-5 text-white"></i>
            </div>
            <div>
                <h1 id="appHeaderTitle" class="text-sm font-bold tracking-wider uppercase text-white">PHOTOBOTH V2</h1>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="toggleFullscreen()" class="glass-button p-2.5 rounded-xl" title="Fullscreen">
                <i data-lucide="maximize" class="w-4 h-4"></i>
            </button>
            <button onclick="toggleGallery()" class="glass-button p-2.5 rounded-xl flex items-center gap-2 text-sm font-semibold">
                <i data-lucide="image" class="w-4 h-4"></i>
                <span id="headerPhotoCount" class="bg-indigo-500 text-white text-[10px] px-2 py-0.5 rounded-full">0</span>
            </button>
        </div>
    </header>

    <div class="absolute bottom-0 w-full z-20 p-4 flex justify-center pb-6">
        <div class="glass-panel w-full max-w-3xl rounded-3xl p-3 flex items-center gap-2 shadow-2xl">
            <select id="timerSelect" class="w-[100px] h-[50px] appearance-none bg-transparent text-white font-bold text-xs text-center cursor-pointer outline-none rounded-2xl hover:bg-white/5">
                <option value="0" class="bg-slate-900">⚡ Instan</option>
                <option value="3" class="bg-slate-900" selected>⏱️ 3 Detik</option>
            </select>
            <button id="captureBtn" class="flex-1 h-[50px] bg-white text-black font-black text-sm rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.3)]">AMBIL FOTO</button>
            <div class="flex gap-2">
                <button id="cycleFrameBtn" class="glass-button w-[50px] h-[50px] rounded-2xl flex items-center justify-center"><i data-lucide="layout-template" class="w-5 h-5"></i></button>
                <button id="switchCameraBtn" class="glass-button w-[50px] h-[50px] rounded-2xl flex items-center justify-center"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            </div>
        </div>
    </div>

    <!-- Script Utama (Sudah termasuk Fullscreen Logic) -->
    <script>
        lucide.createIcons();
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // --- Logika Kamera & Capture Tetap Sama ---
        // ... (Fungsi render, initCamera, dsb. dari file sebelumnya)
        window.onload = () => { 
            // Inisialisasi kamera dan canvas...
        };
    </script>
</body>
</html>
